<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Adak Enterprise</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="fas fa-landmark"></i></div>
      <h1>Admin Panel</h1>
      <p>Adak Enterprise – Tathya Mitra Kendra</p>
    </div>

    <div id="loginError" style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:0.85rem;color:#dc2626;margin-bottom:16px;display:none">
      <i class="fas fa-exclamation-circle"></i> <span id="loginErrorMsg">Invalid credentials</span>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>Username</label>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" class="form-control" id="loginUsername" placeholder="Enter username" autocomplete="username" required />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-group" style="position:relative">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required />
          <button type="button" class="toggle-password" id="togglePwd">
            <i class="fas fa-eye" id="pwdEyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center">
      <a href="/" style="color:var(--gray);font-size:0.82rem">
        <i class="fas fa-arrow-left"></i> Back to Website
      </a>
    </div>

    <div style="margin-top:16px;background:var(--bg);border-radius:8px;padding:10px 14px;font-size:0.78rem;color:var(--gray)">
      <strong>Default login:</strong> admin / AdakAdmin@2024
    </div>
  </div>
</div>

<script>
  const API = '/api';

  // Redirect if already logged in
  const token = sessionStorage.getItem('adminToken');
  if (token) window.location.href = 'dashboard.html';

  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('loginPassword');
    const icon = document.getElementById('pwdEyeIcon');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { pwd.type = 'password'; icon.className = 'fas fa-eye'; }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errDiv = document.getElementById('loginError');
    const errMsg = document.getElementById('loginErrorMsg');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    errDiv.style.display = 'none';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('loginUsername').value.trim(),
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      sessionStorage.setItem('adminToken', data.token);
      sessionStorage.setItem('adminUser', data.username);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errMsg.textContent = err.message;
      errDiv.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
  });
</script>
</body>
</html>
